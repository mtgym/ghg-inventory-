<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHG Dashboard V2.7</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
</head>
<body>
    <div class="dashboard">
        <h1>GHG Dashboard</h1>
        <div class="overview">
            <h2>Cumulative KPI Cards</h2>
            <div class="kpi-card">Total Emisi: {total_emisi}</div>
            <div class="kpi-card">Scope 1: {scope_1}</div>
            <div class="kpi-card">Scope 2 (Location): {scope_2_location}</div>
            <div class="kpi-card">Scope 2 (Market): {scope_2_market}</div>
            <div class="kpi-card">Scope 3: {scope_3}</div>
        </div>
        <div class="operational-tab">
            <h2>Operasional</h2>
            <div class="data-label">Aktivitas:</div>
            <div class="dropdown">
                <label for="comparison">Komparasi Bebas:</label>
                <select id="comparison">
                    <option value="">Select Option</option>
                    <option value="total_scope3">Total Scope 3</option>
                    <!-- Other options go here -->
                </select>
            </div>
        </div>
        <!-- Rest of the HTML structure goes here -->
    </div>
</body>
</html>
